name: Daily Data Refresh

on:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manual-data.json via FRED
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, datetime, sys, os

          FRED_KEY = os.environ.get('FRED_API_KEY', '')
          if not FRED_KEY:
              print("ERROR: FRED_API_KEY secret not set.", file=sys.stderr)
              sys.exit(1)

          today = datetime.date.today().isoformat()

          def fred_latest(series_id, retries=2):
              url = (f"https://api.stlouisfed.org/fred/series/observations"
                     f"?series_id={series_id}&api_key={FRED_KEY}"
                     f"&file_type=json&sort_order=desc&limit=3")
              for attempt in range(retries + 1):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': 'MacroMonitor/1.0'})
                      with urllib.request.urlopen(req, timeout=15) as r:
                          data = json.loads(r.read())
                      for obs in data.get('observations', []):
                          if obs.get('value') and obs['value'] not in ('.', ''):
                              return round(float(obs['value']), 4), obs['date'][:7]
                      return None, None
                  except Exception as e:
                      if attempt == retries:
                          print(f"  WARN {series_id}: {e}", file=sys.stderr)
                          return None, None

          with open('manual-data.json', 'r') as f:
              data = json.load(f)

          changed = False

          def update(section, country, val, date, source):
              global changed
              if val is None:
                  return
              old = data.get(section, {}).get(country, {})
              if old.get('value') != val or old.get('date') != date:
                  data.setdefault(section, {})[country] = {'value': val, 'date': date, 'source': source}
                  changed = True
                  print(f"  {country} {section} → {val} ({date})")

          # ── Policy Rates ──────────────────────────────
          print("Policy rates...")
          POLICY = {
              'USA': ('FEDFUNDS',         'FRED – Federal Reserve'),
              'DEU': ('ECBMRRFR',         'FRED – ECB Main Refinancing Rate'),
              'FRA': ('ECBMRRFR',         'FRED – ECB Main Refinancing Rate'),
              'ITA': ('ECBMRRFR',         'FRED – ECB Main Refinancing Rate'),
              'JPN': ('IRSTCB01JPM156N',  'FRED – OECD / Bank of Japan'),
              'GBR': ('IRSTCB01GBM156N',  'FRED – OECD / Bank of England'),
              'CAN': ('IRSTCB01CAM156N',  'FRED – OECD / Bank of Canada'),
              'CHN': ('IRSTCB01CNM156N',  'FRED – OECD / PBoC'),
              'KOR': ('IRSTCB01KRM156N',  'FRED – OECD / Bank of Korea'),
              'AUS': ('IRSTCB01AUM156N',  'FRED – OECD / RBA'),
              'BRA': ('IRSTCB01BRM156N',  'FRED – OECD / BCB'),
              'IND': ('IRSTCB01INM156N',  'FRED – OECD / RBI'),
          }
          for c, (sid, src) in POLICY.items():
              v, d = fred_latest(sid)
              update('policy_rates', c, v, d, src)

          # ── 10Y Bond Yields ───────────────────────────
          print("10Y bond yields...")
          YIELDS = {
              'USA': ('DGS10',           'FRED – US Treasury'),
              'DEU': ('IRLTLT01DEM156N', 'FRED – OECD MEI'),
              'JPN': ('IRLTLT01JPM156N', 'FRED – OECD MEI'),
              'FRA': ('IRLTLT01FRM156N', 'FRED – OECD MEI'),
              'GBR': ('IRLTLT01GBM156N', 'FRED – OECD MEI'),
              'ITA': ('IRLTLT01ITM156N', 'FRED – OECD MEI'),
              'CAN': ('IRLTLT01CAM156N', 'FRED – OECD MEI'),
              'KOR': ('IRLTLT01KRM156N', 'FRED – OECD MEI'),
              'AUS': ('IRLTLT01AUM156N', 'FRED – OECD MEI'),
              'BRA': ('IRLTLT01BRM156N', 'FRED – OECD MEI'),
              'IND': ('IRLTLT01INM156N', 'FRED – OECD MEI'),
              # CHN: no FRED series → keep manual
          }
          for c, (sid, src) in YIELDS.items():
              v, d = fred_latest(sid)
              update('bond_yields_10y', c, v, d, src)

          # ── Core CPI ──────────────────────────────────
          print("Core CPI...")
          CORE_CPI = {
              'USA': ('CORESTICKM159SFRBATL', 'FRED – Atlanta Fed Sticky-Price Core CPI'),
              'DEU': ('CPGRLE01DEM657N',      'FRED – OECD MEI'),
              'JPN': ('CPGRLE01JPM657N',      'FRED – OECD MEI'),
              'FRA': ('CPGRLE01FRM657N',      'FRED – OECD MEI'),
              'GBR': ('CPGRLE01GBM657N',      'FRED – OECD MEI'),
              'ITA': ('CPGRLE01ITM657N',      'FRED – OECD MEI'),
              'CAN': ('CPGRLE01CAM657N',      'FRED – OECD MEI'),
              'KOR': ('CPGRLE01KRM657N',      'FRED – OECD MEI'),
              'AUS': ('CPGRLE01AUM657N',      'FRED – OECD MEI'),
              # CHN, BRA, IND: not in OECD dataset → keep manual
          }
          for c, (sid, src) in CORE_CPI.items():
              v, d = fred_latest(sid)
              update('core_inflation', c, v, d, src)

          # ── Headline CPI (backup values for WB-lagged data) ───────────────
          print("Headline CPI (backup)...")
          HEADLINE_CPI = {
              'USA': ('CPALTT01USM657N', 'FRED – OECD MEI'),
              'DEU': ('CPALTT01DEM657N', 'FRED – OECD MEI'),
              'JPN': ('CPALTT01JPM657N', 'FRED – OECD MEI'),
              'FRA': ('CPALTT01FRM657N', 'FRED – OECD MEI'),
              'GBR': ('CPALTT01GBM657N', 'FRED – OECD MEI'),
              'ITA': ('CPALTT01ITM657N', 'FRED – OECD MEI'),
              'CAN': ('CPALTT01CAM657N', 'FRED – OECD MEI'),
              'CHN': ('CPALTT01CNM657N', 'FRED – OECD MEI'),
              'KOR': ('CPALTT01KRM657N', 'FRED – OECD MEI'),
              'AUS': ('CPALTT01AUM657N', 'FRED – OECD MEI'),
              'BRA': ('CPALTT01BRM657N', 'FRED – OECD MEI'),
              'IND': ('CPALTT01INM657N', 'FRED – OECD MEI'),
          }
          for c, (sid, src) in HEADLINE_CPI.items():
              v, d = fred_latest(sid)
              update('headline_cpi', c, v, d, src)

          # ── Unemployment (backup values) ───────────────
          print("Unemployment (backup)...")
          UNEMP = {
              'USA': ('UNRATE',           'FRED – BLS'),
              'DEU': ('LRUNTTTTDEM156S',  'FRED – OECD MEI'),
              'JPN': ('LRUNTTTTJPM156S',  'FRED – OECD MEI'),
              'FRA': ('LRUNTTTTFRM156S',  'FRED – OECD MEI'),
              'GBR': ('LRUNTTTTGBM156S',  'FRED – OECD MEI'),
              'ITA': ('LRUNTTTTITM156S',  'FRED – OECD MEI'),
              'CAN': ('LRUNTTTTCAM156S',  'FRED – OECD MEI'),
              'KOR': ('LRUNTTTTKRM156S',  'FRED – OECD MEI'),
              'AUS': ('LRUNTTTTAUM156S',  'FRED – OECD MEI'),
              'BRA': ('LRUNTTTTBRM156S',  'FRED – OECD MEI'),
          }
          for c, (sid, src) in UNEMP.items():
              v, d = fred_latest(sid)
              update('unemployment', c, v, d, src)

          # ── General Govt Debt (IMF DataMapper) ────────
          print("General govt debt (IMF GGXWDG_NGDP)...")
          IMF_COUNTRIES = ['USA','DEU','JPN','FRA','GBR','ITA','CAN','CHN','KOR','AUS','BRA','IND']
          def imf_latest(indicator, iso3):
              url = f"https://www.imf.org/external/datamapper/api/v1/{indicator}/{iso3}"
              for attempt in range(3):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': 'MacroMonitor/1.0'})
                      with urllib.request.urlopen(req, timeout=20) as r:
                          js = json.loads(r.read())
                      country_data = (js.get('values') or {}).get(indicator, {}).get(iso3, {})
                      if not country_data:
                          return None, None
                      # get latest non-null year
                      valid = [(int(yr), v) for yr, v in country_data.items() if v is not None]
                      if not valid:
                          return None, None
                      yr, val = max(valid, key=lambda x: x[0])
                      return round(float(val), 2), str(yr)
                  except Exception as e:
                      if attempt == 2:
                          print(f"  WARN IMF {indicator}/{iso3}: {e}", file=sys.stderr)
                          return None, None

          def update_general(section, country, val, date, source):
              global changed
              if val is None:
                  return
              old = data.get(section, {}).get(country, {})
              if old.get('value') != val or old.get('date') != date:
                  data.setdefault(section, {})[country] = {'value': val, 'date': date, 'source': source}
                  changed = True
                  print(f"  {country} {section} → {val} ({date})")

          for c in IMF_COUNTRIES:
              v, d = imf_latest('GGXWDG_NGDP', c)
              update_general('govt_debt_general', c, v, d, 'IMF DataMapper (GGXWDG_NGDP)')

          if 'govt_debt_general' not in data:
              data['govt_debt_general'] = {}
          data['govt_debt_general']['source_note'] = (
              'IMF General Government Gross Debt (% GDP, GGXWDG_NGDP). Auto-updated daily via GitHub Actions.'
          )

          # ── Finalize ──────────────────────────────────
          data['last_updated'] = today
          with open('manual-data.json', 'w') as f:
              json.dump(data, f, indent=2)
          print(f"\n{'Changes written' if changed else 'No value changes'} — {today}")
          PYEOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manual-data.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-refresh FRED data [$(date -u +%Y-%m-%d)]"
            git push
          fi
